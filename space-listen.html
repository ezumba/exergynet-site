<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Space · ExergyNet</title>
<meta property="og:title" content="🎙️ Live Space on ExergyNet">
<meta property="og:description" content="Listen to a live audio Space — no app needed.">
<!-- Twemoji: cross-platform emoji rendering (E) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/twemoji.min.js" crossorigin="anonymous"></script>
<style>
:root {
  --bg:#0D1117; --surface:#161B22; --surface2:#1c2330; --border:#222a35;
  --text:#e6edf3; --muted:#8b949e; --teal:#00A884; --teal-dim:rgba(0,168,132,.12);
  --red:#e05252; --ghost:#7c6fa0; --ghost-dim:rgba(124,111,160,.14);
  --gold:#f0b429;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:460px;background:var(--surface);border:.5px solid var(--border);border-radius:22px;padding:28px 24px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.live{display:inline-flex;align-items:center;gap:8px;background:rgba(224,82,82,.14);color:var(--red);font-size:13px;font-weight:700;padding:6px 12px;border-radius:20px;letter-spacing:.5px}
.live .dot{width:9px;height:9px;border-radius:50%;background:var(--red);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{font-size:24px;font-weight:800;margin:16px 0 6px;line-height:1.2}
.sub{color:var(--muted);font-size:13px;margin-bottom:4px}
.room-id{font-family:monospace;font-size:12px;color:var(--teal);word-break:break-all;margin-top:10px;padding:8px 12px;background:var(--teal-dim);border-radius:10px}
.btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:14px;border-radius:14px;font-size:15px;font-weight:700;text-decoration:none;margin-top:10px;border:none;cursor:pointer;transition:opacity .15s}
.btn:disabled{opacity:.45;cursor:default}
.btn-primary{background:var(--teal);color:#031b14}
.btn-ghost-listen{background:var(--ghost-dim);color:#c4b5fd;border:.5px solid var(--ghost)}
.btn-android{background:#3ddc84;color:#06251a}
.btn-ios{background:#fff;color:#111;opacity:.6}
.btn-outline{background:transparent;color:var(--muted);border:.5px solid var(--border)}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;margin:18px 0 4px}
.divider::before,.divider::after{content:'';flex:1;height:.5px;background:var(--border)}
/* Modal */
#modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
#modal-bg.open{display:flex}
.modal{background:var(--surface);border:.5px solid var(--border);border-radius:20px;padding:26px 22px;width:100%;max-width:380px}
.modal h2{font-size:18px;font-weight:800;margin-bottom:6px}
.modal p{color:var(--muted);font-size:13px;margin-bottom:18px;line-height:1.5}
.inp{width:100%;background:var(--surface2);border:.5px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;margin-bottom:10px}
.inp:focus{border-color:var(--teal)}
/* Listener UI */
#listen-ui{display:none}
.listener-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.you-badge{background:var(--ghost-dim);color:#c4b5fd;font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;border:.5px solid var(--ghost)}
.section-label{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
/* Stage roster (speakers + host) */
.roster{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px;min-height:44px}
.pip{display:flex;flex-direction:column;align-items:center;gap:5px;width:64px}
.pip .avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;border:2px solid transparent;transition:border-color .2s}
.pip .avatar.speaking{border-color:var(--teal);box-shadow:0 0 10px rgba(0,168,132,.4)}
.pip .avatar.ghost-av{background:var(--ghost-dim);border-color:var(--ghost)}
.pip .avatar.host-av{background:var(--teal-dim);border-color:var(--teal)}
.pip .avatar.speaker-av{background:rgba(240,180,41,.1);border-color:var(--gold)}
.pip .name{font-size:10px;color:var(--muted);text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pip .role-tag{font-size:9px;font-weight:700;color:var(--teal);text-transform:uppercase}
/* Listeners row (A) */
.listeners-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.lpip{display:flex;flex-direction:column;align-items:center;gap:4px;width:52px}
.lpip .lavatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--surface2);border:.5px solid var(--border)}
.lpip .lavatar.ghost-lav{background:var(--ghost-dim);border-color:var(--ghost)}
.lpip .lname{font-size:9px;color:var(--muted);text-align:center;max-width:52px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.listener-more{font-size:11px;color:var(--muted);align-self:center;white-space:nowrap}
/* Chat feed (D) */
.chat-section{background:var(--surface2);border-radius:14px;padding:12px;margin-bottom:14px}
.chat-section-hdr{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
.chat-feed{max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.chat-feed:empty::before{content:'No messages yet…';color:var(--muted);font-size:12px;font-style:italic}
.chat-msg{display:flex;gap:7px;align-items:flex-start}
.chat-msg .chat-sender{font-size:12px;font-weight:700;color:var(--teal);flex-shrink:0;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-msg .chat-text{font-size:13px;color:var(--text);word-break:break-word;line-height:1.4}
/* Status */
.status-bar{background:var(--surface2);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:var(--teal);display:flex;align-items:center;gap:8px}
.status-bar .dot-sm{width:7px;height:7px;border-radius:50%;background:var(--teal);flex-shrink:0;animation:pulse 1.4s infinite}
.btn-sm{padding:10px;font-size:13px;border-radius:10px;margin-top:8px}
.speak-cta{background:var(--teal-dim);border:.5px solid var(--teal);border-radius:14px;padding:14px;margin-top:6px;text-align:center}
.speak-cta p{font-size:13px;color:var(--muted);margin-bottom:10px}
.err-box{background:rgba(224,82,82,.1);border:.5px solid var(--red);border-radius:12px;padding:12px 14px;margin-top:12px;color:var(--red);font-size:13px}
/* Floating emoji reactions (B) */
.reaction-float{position:fixed;bottom:20%;font-size:36px;pointer-events:none;z-index:9999;animation:floatUp 2s ease-out forwards;line-height:1}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}70%{opacity:.8;transform:translateY(-80px) scale(1.2)}100%{opacity:0;transform:translateY(-140px) scale(.8)}}
/* Twemoji img sizing */
img.emoji{width:1.1em;height:1.1em;vertical-align:-.15em;display:inline}
</style>
</head>
<body>

<!-- Name / ghost prompt modal -->
<div id="modal-bg">
  <div class="modal">
    <h2>👻 Enter as Ghost Listener</h2>
    <p>You'll listen in silence — no mic, no account needed.<br>Add a display name so others can see you, or stay anonymous.</p>
    <input id="ghost-name" class="inp" placeholder="Display name (optional)" maxlength="24" autocomplete="off">
    <button class="btn btn-ghost-listen" id="enter-ghost-btn">👻 Enter as Ghost</button>
    <button class="btn btn-outline btn-sm" id="modal-cancel-btn" style="margin-top:6px">Cancel</button>
  </div>
</div>

<div class="card">
  <div id="invite-ui"><!-- invite card injected by JS --></div>
  <div id="listen-ui"><!-- listener UI injected by JS --></div>
</div>

<!-- LiveKit Web SDK (CDN, pinned to v2) -->
<script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
<script>
// ─── Config ──────────────────────────────────────────────────────────────────
var TOKEN_URL = 'https://explorer-api.exergynet.org/space/guest-token';
var LK_URL    = 'wss://livekit.exergynet.org';

// ─── Parse URL ───────────────────────────────────────────────────────────────
var params = new URLSearchParams(location.search);
var roomId = (params.get('room') || '').trim();
var hostId = (params.get('h')    || '').trim();
if (!roomId) {
  var m = location.pathname.match(/\/space[-/]([^\/?#]+)/);
  if (m && m[1] !== 'index.html' && m[1] !== 'listen') roomId = decodeURIComponent(m[1]);
}

// ─── State ───────────────────────────────────────────────────────────────────
var lkRoom       = null;
var myIdentity   = '';
var audioElements = [];
var _audioUnlocked = false;
var _nameMap     = {};   // identity → display name from space.name broadcasts
var _chatMessages = [];  // { sender, senderName, text, ts }

// ─── iOS Audio unlock ────────────────────────────────────────────────────────
function _unlockAudio() {
  if (_audioUnlocked) return;
  _audioUnlocked = true;
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    ctx.resume().then(function() { ctx.close(); });
  } catch(e) {}
  try {
    var v = document.createElement('video');
    v.setAttribute('playsinline', '');
    v.setAttribute('webkit-playsinline', '');
    v.muted = true;
    v.srcObject = new MediaStream();
    v.style.cssText = 'position:absolute;width:1px;height:1px;opacity:0;pointer-events:none';
    document.body.appendChild(v);
    v.play().catch(function(){});
  } catch(e) {}
}

function _showAudioUnlockBanner() {
  if (document.getElementById('audio-unlock-btn')) return;
  var btn = document.createElement('button');
  btn.id = 'audio-unlock-btn';
  btn.className = 'btn btn-primary';
  btn.style.cssText = 'margin:0 0 12px;font-size:16px;';
  btn.textContent = '🔊 Tap to Enable Audio';
  btn.addEventListener('click', function() {
    _unlockAudio();
    if (lkRoom && lkRoom.startAudio) lkRoom.startAudio();
    audioElements.forEach(function(el) { el.play().catch(function(){}); });
    btn.remove();
  });
  listenUi.insertBefore(btn, listenUi.firstChild);
}

// ─── Twemoji helper (E) ──────────────────────────────────────────────────────
function _twemojify(el) {
  if (window.twemoji) twemoji.parse(el, { folder: 'svg', ext: '.svg' });
}

// ─── Floating emoji reaction (B) ─────────────────────────────────────────────
function _showReaction(emoji) {
  var el = document.createElement('div');
  el.className = 'reaction-float';
  el.style.left = (15 + Math.random() * 70) + '%';
  el.textContent = emoji;
  document.body.appendChild(el);
  _twemojify(el);
  setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 2200);
}

// ─── Chat helpers (D) ────────────────────────────────────────────────────────
function _addChatMessage(sender, senderName, text) {
  _chatMessages.push({ sender: sender, name: senderName || sender.slice(0,12), text: text });
  if (_chatMessages.length > 60) _chatMessages.shift();
  var feed = document.getElementById('chat-feed');
  if (!feed) return;
  var div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = '<span class="chat-sender">' + esc(senderName || sender.slice(0,12)) + '</span>'
    + '<span class="chat-text">' + esc(text) + '</span>';
  feed.appendChild(div);
  _twemojify(div);
  feed.scrollTop = feed.scrollHeight;
}

// ─── DOM refs ────────────────────────────────────────────────────────────────
var inviteUi = document.getElementById('invite-ui');
var listenUi = document.getElementById('listen-ui');
var modalBg  = document.getElementById('modal-bg');

// ─── Render invite card ──────────────────────────────────────────────────────
function renderInvite() {
  if (!roomId) {
    inviteUi.innerHTML = [
      '<div style="text-align:center;padding:10px 0 6px">',
      '<div style="font-size:48px;margin-bottom:12px">🎙️</div>',
      '<h1>ExergyNet Spaces</h1>',
      '<p class="sub" style="margin-top:8px">Audio rooms on the sovereign mesh.<br>Ask the host to share their invite link.</p>',
      '</div>',
      '<div class="divider">Get the app</div>',
      '<a class="btn btn-android" href="https://explorer-api.exergynet.org/downloads/ExergyNet-latest.apk">⬇ Download for Android</a>',
    ].join('');
    _twemojify(inviteUi);
    return;
  }

  var deep = 'exergynet://space/' + encodeURIComponent(roomId) + (hostId ? ('?h=' + encodeURIComponent(hostId)) : '');
  var shortRoom = roomId.length > 28 ? roomId.slice(0,12) + '…' + roomId.slice(-8) : roomId;

  inviteUi.innerHTML = [
    '<span class="live"><span class="dot"></span>LIVE SPACE</span>',
    '<h1>A Space is live right now</h1>',
    '<p class="sub">Hosted on the ExergyNet sovereign mesh.</p>',
    '<div class="room-id">' + shortRoom + '</div>',
    '<button class="btn btn-ghost-listen" id="listen-browser-btn" style="margin-top:18px">👻 Listen in Browser (Ghost Mode)</button>',
    '<div class="divider">Have the app?</div>',
    '<a class="btn btn-primary" href="' + deep + '">🎙️ Open in ExergyNet App</a>',
    '<div class="divider">Need the app?</div>',
    '<a class="btn btn-android" href="https://explorer-api.exergynet.org/downloads/ExergyNet-latest.apk">⬇ Download for Android</a>',
    '<button class="btn btn-outline" id="copy-link-btn" style="margin-top:10px">Copy Invite Link</button>',
  ].join('');

  _twemojify(inviteUi);

  document.getElementById('listen-browser-btn').addEventListener('click', function() {
    modalBg.classList.add('open');
    document.getElementById('ghost-name').focus();
  });
  document.getElementById('copy-link-btn').addEventListener('click', function() {
    navigator.clipboard && navigator.clipboard.writeText(location.href).then(function() {
      document.getElementById('copy-link-btn').textContent = '✓ Copied!';
      setTimeout(function() { document.getElementById('copy-link-btn').textContent = 'Copy Invite Link'; }, 1600);
    });
  });
  if (/android/i.test(navigator.userAgent || '')) {
    setTimeout(function() { location.href = deep; }, 800);
  }
}

// ─── Modal handlers ──────────────────────────────────────────────────────────
document.getElementById('enter-ghost-btn').addEventListener('click', function() {
  _unlockAudio();
  var name = document.getElementById('ghost-name').value.trim();
  modalBg.classList.remove('open');
  startListening(name);
});
document.getElementById('modal-cancel-btn').addEventListener('click', function() {
  modalBg.classList.remove('open');
});
document.getElementById('ghost-name').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('enter-ghost-btn').click();
});

// ─── Participant name resolution ──────────────────────────────────────────────
function _resolveName(p) {
  if (_nameMap[p.identity]) return _nameMap[p.identity];
  var meta = {};
  try { meta = JSON.parse(p.metadata || '{}'); } catch(e) {}
  if (meta.displayName) return meta.displayName;
  var isGhost = p.identity.startsWith('ghost_');
  if (isGhost) {
    var gm = p.identity.match(/^ghost_(.+)_[0-9a-f]{4,8}$/i);
    if (gm) return gm[1].replace(/_/g, ' ');
    return 'Ghost';
  }
  return p.identity.slice(0, 12);
}

function _myDisplayName() {
  if (!myIdentity) return 'Ghost';
  var gm = myIdentity.match(/^ghost_(.+)_[0-9a-f]{4,8}$/i);
  if (gm) return gm[1].replace(/_/g, ' ').trim() || 'Ghost';
  if (myIdentity.startsWith('ghost_')) return 'Ghost';
  return myIdentity.slice(0, 12);
}

// ─── Connecting screen ────────────────────────────────────────────────────────
function showConnecting() {
  inviteUi.style.display = 'none';
  listenUi.style.display = 'block';
  listenUi.innerHTML = '<div style="text-align:center;padding:24px 0"><div style="font-size:36px;margin-bottom:14px">⏳</div><p style="color:var(--muted)">Connecting to Space…</p></div>';
}

// ─── Main listener UI (A — individual roster) ─────────────────────────────────
function updateListenerUi() {
  var speakers  = [];
  var listeners = [];

  if (lkRoom) {
    lkRoom.remoteParticipants.forEach(function(p) {
      var meta = {};
      try { meta = JSON.parse(p.metadata || '{}'); } catch(e) {}
      var isGhost = p.identity.startsWith('ghost_');
      var name = _resolveName(p);
      var role = meta.role || (p.permissions && p.permissions.canPublish ? 'speaker' : 'listener');
      var isSpeaking = (lkRoom.activeSpeakers || []).some(function(s) { return s.identity === p.identity; });
      var entry = { id: p.identity, name: name, role: role, isGhost: isGhost, isSpeaking: isSpeaking };
      if (role === 'host' || role === 'speaker' || role === 'cohost') speakers.push(entry);
      else listeners.push(entry);
    });
  }

  var html = [
    '<div class="listener-header">',
    '  <span class="you-badge">👻 You — ' + esc(_myDisplayName()) + '</span>',
    '</div>',
    '<div class="status-bar"><span class="dot-sm"></span>Listening live · ' + esc(roomId.length > 20 ? roomId.slice(0,14)+'…' : roomId) + '</div>',
  ];

  // ── On Stage (speakers + host) ──
  html.push('<div class="section-label">On Stage</div>');
  if (speakers.length > 0) {
    html.push('<div class="roster">');
    speakers.forEach(function(s) {
      var avClass = s.role === 'host' ? 'host-av' : 'speaker-av';
      if (s.isSpeaking) avClass += ' speaking';
      var icon = s.role === 'host' ? '🎙️' : '🔊';
      html.push('<div class="pip"><div class="avatar ' + avClass + '">' + icon + '</div><div class="name">' + esc(s.name) + '</div><div class="role-tag">' + esc(s.role) + '</div></div>');
    });
    html.push('</div>');
  } else {
    html.push('<div class="roster"><span class="empty-roster">Waiting for speakers…</span></div>');
  }

  // ── Listeners (A — individual pips, max 12 shown, +N overflow) ──
  var totalListeners = listeners.length + 1; // +1 self
  if (listeners.length > 0) {
    html.push('<div class="section-label">Listeners · ' + totalListeners + '</div>');
    html.push('<div class="listeners-row">');
    var shown = listeners.slice(0, 12);
    shown.forEach(function(l) {
      var avClass = l.isGhost ? 'ghost-lav' : '';
      var icon = l.isGhost ? '👻' : '👤';
      html.push('<div class="lpip"><div class="lavatar ' + avClass + '">' + icon + '</div><div class="lname">' + esc(l.name) + '</div></div>');
    });
    if (listeners.length > 12) {
      html.push('<span class="listener-more">+' + (listeners.length - 12) + ' more</span>');
    }
    // Always add self pip
    html.push('<div class="lpip"><div class="lavatar ghost-lav">👻</div><div class="lname">You</div></div>');
    html.push('</div>');
  } else {
    html.push('<div style="font-size:12px;color:var(--muted);margin-bottom:14px">👻 You · 1 listener</div>');
  }

  // ── Chat feed (D) ──
  html.push(
    '<div class="chat-section">',
    '  <div class="chat-section-hdr">💬 Space Chat</div>',
    '  <div class="chat-feed" id="chat-feed"></div>',
    '</div>'
  );

  // ── Speak CTA ──
  html.push(
    '<div class="speak-cta">',
    '  <p>Want to speak? Get the ExergyNet app — raise your hand and the host can bring you on stage.</p>',
    '  <a class="btn btn-android btn-sm" href="https://explorer-api.exergynet.org/downloads/ExergyNet-latest.apk">⬇ Download App to Speak</a>',
    '</div>',
    '<button class="btn btn-outline btn-sm" id="leave-btn" style="margin-top:14px">Leave Space</button>'
  );

  listenUi.innerHTML = html.join('');
  _twemojify(listenUi);

  // Re-inject saved chat messages
  var feed = document.getElementById('chat-feed');
  if (feed && _chatMessages.length) {
    _chatMessages.forEach(function(msg) {
      var div = document.createElement('div');
      div.className = 'chat-msg';
      div.innerHTML = '<span class="chat-sender">' + esc(msg.name) + '</span><span class="chat-text">' + esc(msg.text) + '</span>';
      feed.appendChild(div);
      _twemojify(div);
    });
    feed.scrollTop = feed.scrollHeight;
  }

  document.getElementById('leave-btn').addEventListener('click', function() {
    if (lkRoom) lkRoom.disconnect();
    audioElements.forEach(function(el) { el.remove(); });
    audioElements = []; lkRoom = null;
    _chatMessages = []; _nameMap = {};
    inviteUi.style.display = 'block';
    listenUi.style.display = 'none';
    renderInvite();
  });
}

function showError(msg) {
  inviteUi.style.display = 'block';
  listenUi.style.display = 'none';
  var errBox = document.getElementById('listen-error');
  if (!errBox) {
    errBox = document.createElement('div');
    errBox.id = 'listen-error';
    errBox.className = 'err-box';
    inviteUi.appendChild(errBox);
  }
  errBox.textContent = '⚠ ' + msg;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Connect ─────────────────────────────────────────────────────────────────
async function startListening(displayName) {
  // CRITICAL: Create room and call startAudio() SYNCHRONOUSLY before any await.
  // Chrome's user-activation window expires at the first await — startAudio()
  // called after connect() is already outside that window and will be blocked.
  var LK = window.LivekitClient;
  lkRoom = new LK.Room({ adaptiveStream: true, dynacast: false });
  lkRoom.startAudio(); // synchronous call while still in gesture activation chain

  lkRoom
    .on(LK.RoomEvent.Connected, function() { updateListenerUi(); })
    .on(LK.RoomEvent.AudioPlaybackStatusChanged, function() {
      // If audio playback is blocked (e.g. strict browser), show the unlock banner
      if (!lkRoom.canPlaybackAudio) _showAudioUnlockBanner();
    })
    .on(LK.RoomEvent.Disconnected, function(reason) {
      inviteUi.style.display = 'block';
      listenUi.style.display = 'none';
      renderInvite();
      if (reason && reason !== 'CLIENT_INITIATED') showError('Disconnected: ' + reason);
    })
    .on(LK.RoomEvent.TrackSubscribed, function(track) {
      if (track.kind === LK.Track.Kind.Audio) {
        var el = track.attach();
        el.autoplay = true;
        el.setAttribute('playsinline', '');
        document.body.appendChild(el);
        audioElements.push(el);
        el.play().catch(function() { _showAudioUnlockBanner(); });
      }
    })
    .on(LK.RoomEvent.TrackUnsubscribed, function(track) {
      track.detach().forEach(function(el) {
        el.remove();
        audioElements = audioElements.filter(function(a) { return a !== el; });
      });
    })
    .on(LK.RoomEvent.DataReceived, function(payload, participant, kind, topic) {
      var text = '';
      try { text = new TextDecoder().decode(payload); } catch(e) { return; }
      if (topic === 'reaction') {
        _showReaction(text);
      } else if (topic === 'space.chat') {
        try {
          var msg = JSON.parse(text);
          _addChatMessage(msg.sender || '', msg.senderName || '', msg.text || '');
        } catch(e) {}
      } else if (topic === 'space.name') {
        try {
          var obj = JSON.parse(text);
          if (obj.node_id && obj.label) {
            _nameMap[obj.node_id] = obj.label;
            updateListenerUi();
          }
        } catch(e) {}
      }
    })
    .on(LK.RoomEvent.ParticipantConnected,       function() { updateListenerUi(); })
    .on(LK.RoomEvent.ParticipantDisconnected,    function() { updateListenerUi(); })
    .on(LK.RoomEvent.ActiveSpeakersChanged,      function() { updateListenerUi(); })
    .on(LK.RoomEvent.ParticipantMetadataChanged, function() { updateListenerUi(); });

  showConnecting();
  try {
    var url = TOKEN_URL + '?room=' + encodeURIComponent(roomId);
    if (displayName) url += '&name=' + encodeURIComponent(displayName);
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('Token error ' + resp.status);
    var data = await resp.json();
    myIdentity = data.identity;
    // Pre-populate name map from server-side participant snapshot
    if (data.nameMap) Object.assign(_nameMap, data.nameMap);

    await lkRoom.connect(LK_URL, data.token, { autoSubscribe: true });

  } catch (err) {
    console.error('[space-listen]', err);
    inviteUi.style.display = 'block';
    listenUi.style.display = 'none';
    showError(err.message || 'Could not connect. The Space may have ended.');
  }
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
renderInvite();
</script>
</body>
</html>
