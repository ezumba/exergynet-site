<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Space · ExergyNet</title>
<meta property="og:title" content="🎙️ Live Space on ExergyNet">
<meta property="og:description" content="A live audio Space is happening now. Get the app to listen in.">
<meta property="og:type" content="website">
<style>
  :root { --bg:#0D1117; --surface:#161B22; --border:#222a35; --text:#e6edf3; --muted:#8b949e; --teal:#00A884; --red:#e05252; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { width:100%; max-width:440px; background:var(--surface); border:.5px solid var(--border); border-radius:22px; padding:30px 26px; box-shadow:0 20px 60px rgba(0,0,0,.4); }
  .live { display:inline-flex; align-items:center; gap:8px; background:rgba(224,82,82,.14); color:var(--red); font-size:13px; font-weight:700; padding:6px 12px; border-radius:20px; letter-spacing:.5px; }
  .live .dot { width:9px; height:9px; border-radius:50%; background:var(--red); animation:pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  h1 { font-size:26px; font-weight:800; margin:18px 0 6px; line-height:1.2; }
  .sub { color:var(--muted); font-size:14px; margin-bottom:4px; }
  .room-id { font-family:monospace; font-size:12px; color:var(--teal); word-break:break-all; margin-top:10px; padding:8px 12px; background:rgba(0,168,132,.08); border-radius:10px; }
  .btn { display:flex; align-items:center; justify-content:center; gap:10px; width:100%; padding:15px; border-radius:14px; font-size:15px; font-weight:700; text-decoration:none; margin-top:12px; border:none; cursor:pointer; }
  .btn-primary { background:var(--teal); color:#031b14; }
  .btn-android { background:#3ddc84; color:#06251a; }
  .btn-ios { background:#fff; color:#111; opacity:.7; }
  .btn-ghost { background:transparent; color:var(--muted); border:.5px solid var(--border); }
  .btn-listen { background:rgba(255,255,255,.06); color:var(--text); border:.5px solid var(--border); }
  .divider { display:flex; align-items:center; gap:12px; color:var(--muted); font-size:12px; margin:22px 0 6px; }
  .divider::before,.divider::after { content:''; flex:1; height:.5px; background:var(--border); }
  .foot { text-align:center; color:var(--muted); font-size:12px; margin-top:22px; line-height:1.5; }
  /* no-room empty state */
  .empty { text-align:center; padding:16px 0 8px; }
  .empty .icon { font-size:48px; margin-bottom:12px; }
  .empty h2 { font-size:20px; font-weight:700; margin-bottom:8px; }
  .empty p { color:var(--muted); font-size:14px; line-height:1.5; }
</style>
</head>
<body>
<div class="card" id="card">
  <!-- content injected by JS below -->
</div>

<script>
  // Room links look like:
  //   https://exergynet.org/space/?room=GRP_abc123&h=nodeId
  // Generated by the ExergyNet app share sheet. Each Space gets its own unique URL.
  var params = new URLSearchParams(location.search);
  var roomId = (params.get('room') || '').trim();
  var host   = (params.get('h')    || '').trim();

  // Path-segment fallback for future server-side routing —
  // explicitly exclude 'index.html' so direct navigation never shows a fake room.
  if (!roomId) {
    var m = location.pathname.match(/\/space\/([^\/?#]+)/);
    if (m && m[1] !== 'index.html') roomId = decodeURIComponent(m[1]);
  }

  var card = document.getElementById('card');

  if (!roomId) {
    // No room in the URL — generic landing / app download page.
    card.innerHTML = [
      '<div class="empty">',
      '  <div class="icon">🎙️</div>',
      '  <h2>ExergyNet Spaces</h2>',
      '  <p>Audio rooms on the sovereign mesh.<br>Get the app and join a Space — ask the host to share their invite link.</p>',
      '</div>',
      '<div class="divider">Get the app</div>',
      '<a class="btn btn-android" href="https://explorer-api.exergynet.org/downloads/ExergyNet-latest.apk">⬇ Download for Android</a>',
      '<a class="btn btn-ios" id="dl-ios" href="#">⬇ Download for iOS (coming soon)</a>',
    ].join('');
  } else {
    // Room-specific invite page.
    var deep = 'exergynet://space/' + encodeURIComponent(roomId) + (host ? ('?h=' + encodeURIComponent(host)) : '');
    var shortRoom = roomId.length > 28 ? roomId.slice(0, 12) + '…' + roomId.slice(-8) : roomId;

    card.innerHTML = [
      '<span class="live"><span class="dot"></span>LIVE SPACE</span>',
      '<h1>A Space is live right now</h1>',
      '<p class="sub">Hosted on the ExergyNet sovereign mesh — real-time audio, no middleman.</p>',
      '<div class="room-id">' + shortRoom + '</div>',
      '<a class="btn btn-primary" id="open-app" href="' + deep + '">🎙️ Open in ExergyNet app</a>',
      '<a class="btn btn-listen" id="ghost-listen" href="#">👻 Listen in Browser (Ghost Mode)</a>',
      '<div class="divider">Don\'t have the app yet?</div>',
      '<a class="btn btn-android" href="https://explorer-api.exergynet.org/downloads/ExergyNet-latest.apk">⬇ Download for Android</a>',
      '<a class="btn btn-ios" id="dl-ios" href="#">⬇ Download for iOS (coming soon)</a>',
      '<a class="btn btn-ghost" id="copy" href="#">Copy invite link</a>',
      '<p class="foot">After installing, reopen this link to join the Space as a listener.<br>Raise your hand and the host can invite you up to speak.</p>',
    ].join('');

    // Auto-redirect Android users to the app if already installed.
    if (/android/i.test(navigator.userAgent || '')) {
      setTimeout(function() { location.href = deep; }, 800);
    }

    document.getElementById('ghost-listen').addEventListener('click', function(e) {
      e.preventDefault();
      var listenUrl = '/space-listen.html?room=' + encodeURIComponent(roomId) + (host ? ('&h=' + encodeURIComponent(host)) : '');
      location.href = listenUrl;
    });

    document.getElementById('copy').addEventListener('click', function(e) {
      e.preventDefault();
      navigator.clipboard && navigator.clipboard.writeText(location.href).then(function() {
        e.target.textContent = 'Copied!';
        setTimeout(function() { e.target.textContent = 'Copy invite link'; }, 1500);
      });
    });
  }

  // iOS coming soon (shared handler for both states).
  document.addEventListener('click', function(e) {
    if (e.target && e.target.id === 'dl-ios') {
      e.preventDefault(); alert('iOS app is coming soon. Android is available now.');
    }
  });
</script>
</body>
</html>
